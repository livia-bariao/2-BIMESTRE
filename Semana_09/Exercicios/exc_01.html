<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de CPF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Digite o CPF">

    <button onclick="validarCPF()">Validar</button>

    <p id="resultado"></p>
  </div>

  <script>
    function validarCPF() {
      let cpf = document.getElementById("cpf").value;

      // Remove pontos e traços
      cpf = cpf.replace(/[^\d]+/g, '');

      const resultado = document.getElementById("resultado");

      // Verifica tamanho
      if (cpf.length !== 11) {
        resultado.textContent = "CPF inválido!";
        resultado.className = "invalido";
        return;
      }

      // Verifica se todos os números são iguais
      if (/^(\d)\1+$/.test(cpf)) {
        resultado.textContent = "CPF inválido!";
        resultado.className = "invalido";
        return;
      }

      // ===== 1º Dígito =====
      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
      }

      let resto = (soma * 10) % 11;

      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf.charAt(9))) {
        resultado.textContent = "CPF inválido!";
        resultado.className = "invalido";
        return;
      }

      // ===== 2º Dígito =====
      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
      }

      resto = (soma * 10) % 11;

      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf.charAt(10))) {
        resultado.textContent = "CPF inválido!";
        resultado.className = "invalido";
        return;
      }

      resultado.textContent = "CPF válido!";
      resultado.className = "valido";
    }
  </script>

</body>
</html>
