<!DOCTYPE html>
<html lang="pt-BR">
    <style>
        body {
            text-align: center;
            padding: 5rem;
        }

        label{
            padding: 0.5rem;
        }
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico</title>
</head>
<body>
    <div class="converter-container">
        <label>Celsius: </label>
        <input type="number" id="celsius" step="0.1" placeholder="0.00">

        <label>Fahrenheit: </label>
        <input type="number" id="fahrenheit" step="0.1" placeholder="32.00">
    </div>
</body>

<script>

const inputC = document.getElementById('celsius');
const inputF = document.getElementById('fahrenheit');

inputC.addEventListener('input', () => {
    const valor = parseFloat(inputC.value);
    
    
    if (!isNaN(valor)) {
        const resultado = (valor * 9/5) + 32;
        inputF.value = resultado.toFixed(2);
    } else {
        inputF.value = '';
    }
});

inputF.addEventListener('input', () => {
    const valor = parseFloat(inputF.value);
    
    if (!isNaN(valor)) {
        const resultado = (valor - 32) * 5/9;
        inputC.value = resultado.toFixed(2);
    } else {
        inputC.value = '';
    }
});
</script>

</html>
